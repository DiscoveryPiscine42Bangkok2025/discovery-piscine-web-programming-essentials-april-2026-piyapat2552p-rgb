<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ex00bis - jQuery Background</title>
    <link rel="stylesheet" href="backgroound.css">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body>

    <div class="container">
        <button id="changeBtn">Click to Change Color</button>
    </div>

    <script>
        // ตรวจสอบว่า DOM พร้อมทำงาน
        $(document).ready(function() {
            // ใช้ jQuery Selector และ .on('click') แทนคำสั่งเดิม
            $('#changeBtn').on('click', function() {
                // ฟังก์ชันสุ่มสี
                const randomColor = '#' + Math.floor(Math.random()*16777215).toString(16);
                
                // ใช้ .css() ของ jQuery เพื่อเปลี่ยนสีพื้นหลัง
                $('body').css('background-color', randomColor);
            });
        });
    </script>

</body>
</html>
