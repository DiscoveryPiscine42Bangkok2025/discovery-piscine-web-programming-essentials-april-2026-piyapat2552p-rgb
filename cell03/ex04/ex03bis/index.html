<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To do or not to do - jQuery</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; background-color: #ffffff; }
        #ft_list { margin-top: 20px; border: 1px solid #ffc0cb; min-height: 50px; }
        #ft_list div { 
            padding: 10px; 
            border-bottom: 1px solid #eee; 
            cursor: pointer; 
            background: #fff;
            transition: background 0.2s;
        }
        #ft_list div:hover { background: #fff0f5; } /* สีชมพูจางๆ เวลา hover */
        #new_btn {
            padding: 10px 20px;
            background-color: #ffc0cb;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <button id="new_btn">New</button>
    <div id="ft_list"></div>

    <script src="todo.js"></script>
</body>
</html>
