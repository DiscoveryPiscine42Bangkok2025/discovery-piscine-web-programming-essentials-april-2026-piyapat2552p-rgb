<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="card.css">
    <title>User Profile Card</title>
</head>
<body>

    <div class="card">
        <h2>User Profile Card</h2>

        <table class="profile-table">
            <tr>
                <td>
                    <img src="https://i.ibb.co/JW5CHqYt/661413540-1359583392595140-4073660632683477244-n.jpg" alt="Profile Picture" class="profile-img">
                    
                    <p class="login-name"> Piyapat Jaiyen.id </p>
                    
                    <p class="description">Creative Web Developer</p>
                </td>
            </tr>
            <tr>
                <td>
                    <div class="social-icons">
                        <img src="https://cdn-icons-png.flaticon.com/512/733/733547.png" alt="FB">
                        <img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png" alt="IG">
                        <img src="https://cdn-icons-png.flaticon.com/512/733/733579.png" alt="TW">
                    </div>
                </td>
            </tr>
            <tr>
                <td>
                    <button class="contact-btn">Contact</button>
                </td>
            </tr>
        </table>
    </div>

</body>
</html>
